name: Feature request
description: Propose a new capability or compatibility improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or compatibility gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should we verify this works?
    validations:
      required: false
